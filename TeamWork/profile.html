<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <span>TeamWork</span>

                    <li><a href="main.html">Головна</a></li>
                    <li><a href="teams.html">Команди</a></li>

            </nav>
        </div>

    <!-- Інформаційний блок -->

        <div class="info-overlay">
            <h1>Ласкаво просимо до TeamWork</h1>

    <!-- Форма авторизації -->
    <div class="auth-container">
        <h2>Авторизація</h2>
        <form action="#" method="POST">
            <input type="email" name="email" placeholder="Введіть email" required>
            <input type="password" name="password" placeholder="Введіть пароль" required>
            <button type="submit">Увійти</button>
        </form>
        <p>Забули пароль? <a href="#">Відновити</a></p>
    </div>

    <footer>
        <div class="container">
            <p>© 2024 TeamWork. Ефективність – у ваших руках.</p>
        </div>
